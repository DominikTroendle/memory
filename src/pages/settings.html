<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/assets/favicon-settings.ico">
    <title>Memory - Settings</title>
</head>
<body>
    <main class="settings">
        <header class="settings__header">
            <h2>Settings</h2>
        </header>
        <div class="settings__layout">
            <form class="settings__form">
                <fieldset>
                    <legend>
                        <img src="/assets/palette.png" alt="palette-icon">
                        Game Themes
                    </legend>
                    <label>
                        <input type="radio" name="theme" value="Code Vibes Theme">
                        Code Vibes Theme
                    </label>
                    <label>
                        <input type="radio" name="theme" value="Gaming Theme">
                        Gaming Theme
                    </label>
                </fieldset>
                <fieldset>
                    <legend>
                        <img src="/assets/pawn.png" alt="pawn-icon">
                        Choose Player
                    </legend>
                    <label>
                        <input type="radio" name="player" value="Blue">
                        Blue
                    </label>
                    <label>
                        <input type="radio" name="player" value="Orange">
                        Orange
                    </label>
                </fieldset>
                <fieldset>
                    <legend>
                        <img src="/assets/board-size.png" alt="board-icon">
                        Board Size
                    </legend>
                    <label>
                        <input type="radio" name="board" value="16">
                        16 Cards
                    </label>
                    <label>
                        <input type="radio" name="board" value="24">
                        24 Cards
                    </label>
                    <label>
                        <input type="radio" name="board" value="36">
                        36 Cards
                    </label>
                </fieldset>
            </form>
            <div class="settings__right">
                <img class="settings__preview" id="preview" src="/assets/theme-coding_preview.png" alt="theme-preview">
                <section class="settings__summary">
                    <ul>
                        <li id="summary-theme">Theme</li>
                        <li id="summary-player">Player</li>
                        <li id="summary-board">Board</li>
                    </ul>
                    <a class="button button--start button--disabled button--primary" id="button-start" href="game.html">
                        <img class="button__icon" src="/assets/play_tilted.png" alt="icon-play">
                        <span class="button__text">Start</span>
                    </a>
                </section>
            </div>
        </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/scripts/settings.ts"></script>
</body>
</html>
