<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/assets/favicon-game-over.ico">
    <title>Memory - Game Over</title>
</head>
<body id="body">
    <main class="gameover">
        <header class="gameover__header">
            <img class="gameover__hero gameover__hero--coding" src="/assets/game-over.png" alt="gameover-logo">
            <h1 class="gameover__headline">GAME OVER</h1>
            <h2 class="gameover__subheadline">Final Score</h2>
            <section class="game__score">
                <ul>
                    <li class="game__score--blue">
                        <span class="game__currentPlayer--codingTheme">Blue</span> 
                        <span id="final-score-blue">0</span>
                    </li>
                    <li class="game__score--orange">
                        <span class="game__currentPlayer--codingTheme">Orange</span>
                        <span id="final-score-orange">0</span>
                    </li>
                </ul>
            </section>
        </header>
    </main>
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/scripts/game-end.ts"></script>
</body>
</html>
