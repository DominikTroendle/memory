<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory - Game</title>
</head>
<body id="body">
    <dialog class="overlay" id="overlay">
        <div class="overlay__card" id="card">
            <p class="overlay__text">Are you sure you want to quit the game? </p>
            <nav class="overlay__nav">
                <button class="button button__exit button__exit--bgSolid" id="resume">
                    <span class="button__text button__text--sm">Resume Playing</span>
                </button>
                <button class="button button__exit" id="menu">
                    <span class="button__text button__text--sm button__text--colored">Exit Game</span>
                </button>
            </nav>
        </div>
    </dialog>
    <main class="game">
        <header class="game__header">
            <section class="game__score">
                <ul>
                    <li class="game__score--blue">
                        <span class="game__currentPlayer--codingTheme">Blue</span> 
                        <span id="score-blue">0</span>
                    </li>
                    <li class="game__score--orange">
                        <span class="game__currentPlayer--codingTheme">Orange</span> 
                        <span id="score-orange">0</span>
                    </li>
                </ul>
            </section>
            <section class="game__player">
                <p class="current-player game__player--blue" id="player">Current Player:</p>
            </section>
            <button class="button button__exit" id="exit">
                <img class="button__icon" src="/assets/forward.png" alt="forward-icon">
                <span class="button__text">Exit Game</span>
            </button>
        </header>
        <section class="game__field game__field--small" id="field">
        </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/scripts/game.ts"></script>
</body>
</html>
