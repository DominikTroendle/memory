<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory - Game</title>
</head>
<body>
    <main class="game">
        <header class="game__header">
            <section class="game__score">
                <ul>
                    <li class="game__score--blue">
                        Blue 
                        <span id="score-blue">0</span>
                    </li>
                    <li class="game__score--orange">
                        Orange 
                        <span id="score-orange">0</span>
                    </li>
                </ul>
            </section>
            <section class="game__player">
                <p class="game__player--blue">Current Player:</p>
            </section>
            <button class="button button--exit button--primary">
                <img class="button__icon" src="../assets/forward.png" alt="forward-icon">
                <span class="button__text">Exit Game</span>
            </button>
        </header>
        <section class="game__field game__field--small" id="field">
            <button class="card">
                <div class="card__inner">
                    <div class="card__face"></div>
                    <div class="card__face card__face--back"></div>
                </div>
            </button>
        </section>
    </main>
    <script type="module" src="../src/main.ts"></script>
</body>
</html>
