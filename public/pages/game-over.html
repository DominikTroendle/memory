<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory - Game Over</title>
</head>
<body>
    <main class="gameover">
        <header class="gameover__header">
            <img class="gameover__hero" src="../assets/game-over.png" alt="gameover-logo">
            <h1 class="gameover__headline">Final Score</h1>
            <section class="game__score">
                <ul>
                    <li class="game__score--blue">
                        Blue 
                        <span id="final-score-blue">0</span>
                    </li>
                    <li class="game__score--orange">
                        Orange 
                        <span id="final-score-orange">0</span>
                    </li>
                </ul>
            </section>
        </header>
        <nav>
            <a class="button button__exit" href="/memory/">
                <span class="button__text">Back to Menu</span>
            </a>
        </nav>
    </main>
    <script type="module" src="../src/main.ts"></script>
    <script type="module" src="../src/scripts/game-end.ts"></script>
</body>
</html>
